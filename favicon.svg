<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- White Chart Frame/Axis Base -->
  <path d="M 80,90 L 80,420 L 432,420" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Green Financial Bars (Growth) -->
  <g fill="none" stroke-width="24" stroke-linecap="round" stroke="#10B981">
    <line x1="230" y1="420" x2="230" y2="340" />
    <line x1="290" y1="420" x2="290" y2="290" />
    <line x1="350" y1="420" x2="350" y2="250" />
  </g>

  <!-- Red Volume Breakout Bar -->
  <line x1="410" y1="420" x2="410" y2="190" fill="none" stroke="#EF4444" stroke-width="24" stroke-linecap="round" />
  
  <!-- Trending Trendline (Green transitioning to a Red Arrowhead) -->
  <path d="M 200,310 L 250,240 L 310,290 L 360,225" fill="none" stroke="#10B981" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 360,225 L 435,135" fill="none" stroke="#EF4444" stroke-width="28" stroke-linecap="round" />
  <!-- Red Arrowhead -->
  <path d="M 380,135 L 435,135 L 435,190" fill="none" stroke="#EF4444" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />

  <!-- The Dollar Sign Symbol -->
  <!-- Split-color S curve (Green bottom, White top) -->
  <path d="M 205,290 C 205,340 125,340 125,300" fill="none" stroke="#10B981" stroke-width="24" stroke-linecap="round" />
  <path d="M 215,185 C 215,145 135,145 135,195 C 135,245 205,240 205,290" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" />
  <!-- Main Vertical Dollar Line (White) -->
  <line x1="165" y1="110" x2="165" y2="400" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" />
</svg>
